<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="faviconTitle faviconDesc">
  <title id="faviconTitle">WebClock favicon</title>
  <desc id="faviconDesc">A rounded desk clock icon with a green status dot and blue clock hands.</desc>
  <defs>
    <linearGradient id="appBg" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dce9f7"/>
    </linearGradient>
    <linearGradient id="shellFill" x1="14" y1="12" x2="50" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#eef3f9" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="screenFill" x1="18" y1="16" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdfdff"/>
      <stop offset="1" stop-color="#eff4fa"/>
    </linearGradient>
    <linearGradient id="ringFill" x1="24" y1="24" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2997ff"/>
      <stop offset="1" stop-color="#0071e3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: url(#appBg); }
      .shell { fill: url(#shellFill); stroke: rgba(110, 118, 135, 0.28); }
      .screen { fill: url(#screenFill); stroke: rgba(15, 23, 42, 0.07); }
      .ring { fill: none; stroke: url(#ringFill); }
      .hand { stroke: #0058b0; }
      .footer { fill: #c7d7ea; }
      .dot { fill: #30d158; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #111214; }
        .shell { fill: #171a20; stroke: rgba(255, 255, 255, 0.1); }
        .screen { fill: #0f141d; stroke: rgba(255, 255, 255, 0.08); }
        .ring { stroke: #56adff; }
        .hand { stroke: #d6ecff; }
        .footer { fill: #314156; }
        .dot { fill: #32d74b; }
      }
    </style>
  </defs>

  <rect class="bg" x="4" y="4" width="56" height="56" rx="18"/>
  <g filter="url(#softShadow)">
    <rect class="shell" x="11" y="10" width="42" height="44" rx="15" stroke-width="1.2"/>
    <rect class="screen" x="16" y="15" width="32" height="34" rx="11" stroke-width="1"/>
  </g>

  <circle class="dot" cx="22" cy="21" r="2.8"/>
  <rect class="footer" x="23" y="44" width="18" height="2.5" rx="1.25"/>
  <circle class="ring" cx="32" cy="32" r="9.5" stroke-width="3.2"/>
  <path class="hand" d="M32 32V26.2" stroke-width="3" stroke-linecap="round"/>
  <path class="hand" d="M32 32L36.8 35.2" stroke-width="3" stroke-linecap="round"/>
  <circle class="hand" cx="32" cy="32" r="1.8"/>
</svg>
